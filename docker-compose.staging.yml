version: "3.9"

services:
  mysql:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-peluqueria_staging}
      MYSQL_USER: ${MYSQL_USER:-stratus_stg}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data_staging:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-stratus_stg}:${MYSQL_PASSWORD}@mysql/${MYSQL_DATABASE:-peluqueria_staging}
      SUPERADMIN_SETUP_SECRET: ${SUPERADMIN_SETUP_SECRET}
      PRODUCTION_DOMAIN: ${PRODUCTION_DOMAIN}
    ports:
      - "8001:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    ports:
      - "3011:80"

  frontend-user:
    build:
      context: ./frontend-user
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    ports:
      - "3012:80"

  super-admin:
    build:
      context: ./super-admin
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    ports:
      - "3013:80"

volumes:
  mysql_data_staging:
